{% extends "base.html" %}

{% block content %}
<div class="row mb-5">
    <div class="col-12">
        <h2 class="mb-4">Generate <span class="gradient-text">Study Materials</span></h2>
        <p class="text-secondary">Select a document and choose what type of study material you want to generate.</p>
    </div>
</div>

<div class="row">
    <div class="col-md-5 mb-4">
        <div class="glass-card p-4 h-100">
            <h4 class="mb-4">Configuration</h4>
            <div class="mb-4">
                <label for="doc-select" class="form-label text-secondary">Select Document</label>
                <select id="doc-select" class="form-select bg-dark text-white border-secondary">
                    <option value="" disabled selected>Choose a document...</option>
                    {% for doc in docs %}
                        <option value="{{ doc.id }}">{{ doc.file_name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="d-grid gap-3">
                <button class="btn btn-outline-info text-start generate-btn" data-type="summary">
                    <i class="bi bi-card-text me-2"></i> Generate Summary
                </button>
                <button class="btn btn-outline-primary text-start generate-btn" data-type="notes">
                    <i class="bi bi-journal-text me-2"></i> Generate Detailed Notes
                </button>
                <button class="btn btn-outline-warning text-start generate-btn" data-type="quiz">
                    <i class="bi bi-ui-checks me-2"></i> Generate Quiz (MCQs)
                </button>
                <button class="btn btn-outline-success text-start generate-btn" data-type="flashcards">
                    <i class="bi bi-card-heading me-2"></i> Generate Flashcards
                </button>
            </div>
        </div>
    </div>
    
    <div class="col-md-7 mb-4">
        <div class="glass-card p-4 h-100 d-flex flex-column">
            <h4 class="mb-4 border-bottom border-secondary pb-3">Output Viewer</h4>
            <div id="loading-spinner" class="text-center my-5 d-none">
                <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3 text-secondary">Generating AI content, please wait...</p>
            </div>
            <div id="output-area" class="flex-grow-1 overflow-auto" style="max-height: 60vh;">
                <div class="text-center text-secondary my-5" id="placeholder">
                    <i class="bi bi-magic display-1 mb-3 text-muted"></i>
                    <p>Select a document and click a generate button.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const generateBtns = document.querySelectorAll('.generate-btn');
    const docSelect = document.getElementById('doc-select');
    const outputArea = document.getElementById('output-area');
    const loadingSpinner = document.getElementById('loading-spinner');
    const placeholder = document.getElementById('placeholder');
    
    generateBtns.forEach(btn => {
        btn.addEventListener('click', async function() {
            const docId = docSelect.value;
            if (!docId) {
                alert('Please select a document first.');
                return;
            }
            
            const genType = this.getAttribute('data-type');
            
            // UI State updates
            outputArea.innerHTML = '';
            if (placeholder) placeholder.style.display = 'none';
            loadingSpinner.classList.remove('d-none');
            
            generateBtns.forEach(b => b.disabled = true);
            
            try {
                const response = await fetch('{{ url_for("api_generate") }}', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ doc_id: docId, type: genType })
                });
                
                const data = await response.json();
                loadingSpinner.classList.add('d-none');
                
                if (response.ok) {
                    renderOutput(data.result, genType);
                } else {
                    outputArea.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                }
            } catch (error) {
                loadingSpinner.classList.add('d-none');
                outputArea.innerHTML = `<div class="alert alert-danger">Connection error. Please try again.</div>`;
            } finally {
                generateBtns.forEach(b => b.disabled = false);
            }
        });
    });
    
    function renderOutput(data, type, isAppend = false) {
        if (type === 'summary' || type === 'notes') {
            // Text output parsed from Markdown
            outputArea.innerHTML = `<div class="bg-dark bg-opacity-50 p-4 rounded-3 markdown-content">${marked.parse(data)}</div>`;
        } else if (type === 'quiz') {
            // JSON array of quiz objects
            let existingQuestionsCount = 0;
            if (isAppend) {
                existingQuestionsCount = document.querySelectorAll('.quiz-question').length;
            }
            
            let html = isAppend ? '' : '<div class="list-group list-group-flush bg-transparent" id="quiz-container">';
            data.forEach((q, i) => {
                let optionsHtml = '';
                q.options.forEach((opt) => {
                    const safeOpt = opt.replace(/"/g, '&quot;');
                    const safeAns = q.answer.replace(/"/g, '&quot;');
                    optionsHtml += `<button type="button" class="list-group-item list-group-item-action bg-transparent text-white border-secondary quiz-option" data-correct="${safeOpt === safeAns ? 'true' : 'false'}">${opt}</button>`;
                });
                
                html += `
                <div class="list-group-item bg-dark bg-opacity-50 text-white mb-3 rounded-3 border-0 quiz-question">
                    <h5>Q${existingQuestionsCount + i + 1}: ${q.question}</h5>
                    <div class="list-group mt-3">${optionsHtml}</div>
                    <div class="mt-3 p-3 bg-secondary bg-opacity-25 rounded-3 explanation d-none">
                        <strong>Explanation:</strong> ${q.explanation || 'No explanation provided.'}
                    </div>
                </div>`;
            });
            
            html += `
                <div class="text-center mt-4 mb-2" id="generate-more-container">
                    <button class="btn btn-outline-warning" id="generate-more-btn">
                        <i class="bi bi-arrow-clockwise me-2"></i>Generate More Questions
                    </button>
                </div>
            `;
            
            if (isAppend) {
                const oldContainer = document.getElementById('generate-more-container');
                if (oldContainer) oldContainer.remove();
                document.getElementById('quiz-container').insertAdjacentHTML('beforeend', html);
            } else {
                html += '</div>';
                outputArea.innerHTML = html;
            }
            
            // Add interactivity
            outputArea.querySelectorAll('.quiz-option:not(.bound)').forEach(btn => {
                btn.classList.add('bound');
                btn.addEventListener('click', function() {
                    const parentQuestion = this.closest('.quiz-question');
                    const allOptions = parentQuestion.querySelectorAll('.quiz-option');
                    const explanation = parentQuestion.querySelector('.explanation');
                    
                    if (this.disabled) return;
                    
                    allOptions.forEach(o => {
                        o.disabled = true;
                        if (o.getAttribute('data-correct') === 'true') {
                            o.classList.remove('bg-transparent');
                            o.classList.add('bg-success', 'text-white');
                        } else if (o === this) {
                            o.classList.remove('bg-transparent');
                            o.classList.add('bg-danger', 'text-white');
                        }
                    });
                    
                    explanation.classList.remove('d-none');
                });
            });
            
            // Add listener to generate more button
            const genMoreBtn = document.getElementById('generate-more-btn');
            if (genMoreBtn) {
                genMoreBtn.addEventListener('click', async function() {
                    const docId = document.getElementById('doc-select').value;
                    this.disabled = true;
                    this.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Generating...';
                    try {
                        const response = await fetch('{{ url_for("api_generate") }}', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ doc_id: docId, type: 'quiz' })
                        });
                        const newData = await response.json();
                        if (response.ok) {
                            renderOutput(newData.result, 'quiz', true);
                        } else {
                            alert('Error: ' + newData.error);
                            this.disabled = false;
                            this.innerHTML = '<i class="bi bi-arrow-clockwise me-2"></i>Generate More Questions';
                        }
                    } catch (e) {
                        alert('Connection error');
                        this.disabled = false;
                        this.innerHTML = '<i class="bi bi-arrow-clockwise me-2"></i>Generate More Questions';
                    }
                });
            }
        } else if (type === 'flashcards') {
            // JSON array of flashcard objects
            let html = isAppend ? '' : '<div class="row row-cols-1 row-cols-md-2 g-4" id="flashcard-container">';
            data.forEach((card, i) => {
                html += `
                <div class="col flashcard-item">
                    <div class="card h-100 bg-dark text-white border-info" style="perspective: 1000px; cursor: pointer;" onclick="this.querySelector('.flip-card-inner').classList.toggle('flipped')">
                        <div class="flip-card-inner" style="transition: transform 0.6s; transform-style: preserve-3d; position: relative; width: 100%; height: 100%; min-height: 250px;">
                            <div class="card-body d-flex flex-column align-items-center justify-content-center text-center p-4 position-absolute w-100 h-100 backface-hidden" style="backface-visibility: hidden; z-index: 2; background: rgba(30, 41, 59, 0.9); overflow-y: auto;">
                                <div>
                                    <span class="badge bg-info text-dark mb-2">Front</span>
                                    <h5 class="card-title">${card.question}</h5>
                                    <small class="text-secondary mt-3 d-block">Click to flip</small>
                                </div>
                            </div>
                            <div class="card-body d-flex flex-column align-items-center justify-content-center text-center p-4 position-absolute w-100 h-100 bg-info text-dark rounded" style="backface-visibility: hidden; transform: rotateY(180deg); overflow-y: auto;">
                                <div class="w-100">
                                    <span class="badge bg-dark text-white mb-2">Back</span>
                                    <p class="card-text fw-bold mb-0">${card.answer}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <style>
                    .flipped { transform: rotateY(180deg); }
                </style>`;
            });
            
            html += `
                <div class="col-12 text-center mt-4 mb-2" id="generate-more-flashcards-container">
                    <button class="btn btn-outline-info" id="generate-more-flashcards-btn">
                        <i class="bi bi-arrow-clockwise me-2"></i>Generate More Flashcards
                    </button>
                </div>
            `;
            
            if (isAppend) {
                const oldContainer = document.getElementById('generate-more-flashcards-container');
                if (oldContainer) oldContainer.remove();
                document.getElementById('flashcard-container').insertAdjacentHTML('beforeend', html);
            } else {
                html += '</div>';
                outputArea.innerHTML = html;
            }
            
            // Add listener to generate more button
            const genMoreBtn = document.getElementById('generate-more-flashcards-btn');
            if (genMoreBtn) {
                genMoreBtn.addEventListener('click', async function() {
                    const docId = document.getElementById('doc-select').value;
                    this.disabled = true;
                    this.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Generating...';
                    try {
                        const response = await fetch('{{ url_for("api_generate") }}', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ doc_id: docId, type: 'flashcards' })
                        });
                        const newData = await response.json();
                        if (response.ok) {
                            renderOutput(newData.result, 'flashcards', true);
                        } else {
                            alert('Error: ' + newData.error);
                            this.disabled = false;
                            this.innerHTML = '<i class="bi bi-arrow-clockwise me-2"></i>Generate More Flashcards';
                        }
                    } catch (e) {
                        alert('Connection error');
                        this.disabled = false;
                        this.innerHTML = '<i class="bi bi-arrow-clockwise me-2"></i>Generate More Flashcards';
                    }
                });
            }
        }
    }
});
</script>
{% endblock %}
