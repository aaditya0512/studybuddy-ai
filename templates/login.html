{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center align-items-center h-100 mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card p-5">
            <h2 class="text-center mb-4">Welcome Back</h2>
            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3">
                    <label for="email" class="form-label text-secondary">Email address</label>
                    <input type="email" class="form-control py-2" id="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label text-secondary">Password</label>
                    <input type="password" class="form-control py-2" id="password" name="password" required placeholder="Enter your password">
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Login</button>
                </div>
            </form>
            <p class="text-center mt-4 text-secondary">
                Don't have an account? <a href="{{ url_for('register') }}" class="text-primary text-decoration-none">Sign up</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
